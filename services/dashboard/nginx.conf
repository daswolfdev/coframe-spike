server {
  listen 8081;
  root /usr/share/nginx/html;

  location = /healthz {
    return 200 "ok\n";
  }

  # Same-origin proxy to the api (the one place its address is stated).
  # Variable upstream + resolver = DNS at request time, so nginx starts (and
  # the page serves its empty states) even when the api isn't up yet; failures
  # surface as per-request 502s. 127.0.0.11 is Docker's embedded DNS.
  location /api/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://api:8080;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $api_upstream;
  }
}
