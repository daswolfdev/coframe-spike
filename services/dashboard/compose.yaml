# dashboard — static frontend. Owns host port 8081 (service-owned, no central
# registry — see services/_template/compose.yaml rule 4).
services:
  dashboard:
    build:
      context: ./services/dashboard
    init: true
    ports:
      - "127.0.0.1:8081:8081" # loopback only — the laptop's LAN has no business here (#32)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
      start_interval: 1s
