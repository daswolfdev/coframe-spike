# Platform-owned compose config. Services NEVER need edits here — they
# self-register by existing as services/<name>/compose.yaml.
name: perfmon

# The platform's entire shared-infra footprint: one volume holding the SQLite
# files (queue.db now; agg.db with the worker). Services that need state mount
# it from their own fragment. Why no queue/db containers: see docs/design.md
# and docs/reports/2026-07-18-sqlite-wal-throughput.md.
volumes:
  data:
